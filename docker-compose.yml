version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wasfaty_sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Pass123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  wasfaty-api:
    build:
      context: .
      dockerfile: Wasfaty.API/Dockerfile
    container_name: wasfaty_api
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=WasfatyDb;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;
    ports:
      - "5000:80"

volumes:
  sql_data: